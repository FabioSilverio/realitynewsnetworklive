<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSN Live — Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#020403" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme:dark; --bg:#020403; --panel:#0b0f0d; --line:rgba(190,255,206,0.12); --line-strong:rgba(100,255,142,0.28); --text:#f5fff7; --muted:#91a197; --dim:#617066; --green:#39ff7a; --green-2:#94ff24; --red:#ff4f4f; --mono:"JetBrains Mono",monospace; --shadow:0 28px 90px rgba(0,0,0,0.52); }
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:var(--mono);background:radial-gradient(circle at 82% 16%, rgba(58,255,122,0.08), transparent 24rem),linear-gradient(180deg,#030604 0%,#010201 100%);min-height:100vh;display:grid;place-items:center;padding:24px}
    .scanline{position:fixed;inset:0;z-index:50;pointer-events:none;background:repeating-linear-gradient(180deg,rgba(255,255,255,0.018) 0,rgba(255,255,255,0.018) 1px,transparent 1px,transparent 4px);mix-blend-mode:screen;opacity:0.5}
    a{color:inherit;text-decoration:none}
    .wrap{width:100%;max-width:600px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
    .topbar img{width:140px;height:auto}
    .back{color:var(--dim);font-size:0.76rem;font-weight:800}
    .gate{display:grid;gap:12px;padding:28px;border:1px solid var(--line-strong);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}
    .gate label{color:var(--green-2);font-size:0.72rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase}
    .gate input{min-height:46px;padding:0 14px;border:1px solid rgba(190,255,206,0.14);border-radius:4px;color:var(--text);background:rgba(0,0,0,0.36);font:700 0.78rem/1 var(--mono)}
    .gate button{min-height:46px;padding:0 14px;border:1px solid rgba(57,255,122,0.3);border-radius:4px;color:#061009;background:var(--green);font:900 0.72rem/1 var(--mono);cursor:pointer}
    .gate p{margin:0;color:var(--dim);font-size:0.68rem;text-align:center}
    .panel{display:none;gap:18px}
    .panel.is-open{display:grid}
    .panel h1{margin:0;font-size:1.3rem;text-transform:uppercase}
    .panel .sub{color:var(--dim);font-size:0.78rem;margin:-8px 0 0}
    .form{display:grid;gap:12px;padding:20px;border:1px solid var(--line);border-radius:6px;background:linear-gradient(180deg,rgba(255,255,255,0.055),rgba(255,255,255,0.025))}
    .form label{color:var(--text);font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px}
    .form input{min-width:0;min-height:46px;padding:0 14px;border:1px solid rgba(190,255,206,0.14);border-radius:4px;color:var(--text);background:rgba(0,0,0,0.36);font:700 0.78rem/1 var(--mono)}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 14px;border:1px solid rgba(57,255,122,0.3);border-radius:4px;color:#061009;background:var(--green);font:900 0.72rem/1 var(--mono);cursor:pointer;white-space:nowrap}
    .btn-ghost{color:var(--text);background:rgba(255,255,255,0.04)}
    .form p{margin:0;color:var(--muted);font-size:0.7rem;line-height:1.6}
    .actions{display:flex;flex-wrap:wrap;gap:10px}
    .preview{margin-top:6px;padding:16px;border:1px solid var(--line);border-radius:6px;background:rgba(255,255,255,0.028)}
    .preview p{margin:0 0 8px;color:var(--muted);font-size:0.7rem}
    .preview code{display:block;padding:10px 12px;border-radius:4px;background:rgba(0,0,0,0.36);color:var(--green-2);font:700 0.78rem/1.4 var(--mono);word-break:break-all}
    .error{color:var(--red)!important}
    @media(max-width:500px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="scanline" aria-hidden="true"></div>
  <div class="wrap">
    <header class="topbar">
      <a href="./"><img src="assets/img/rsn-logo.svg" alt="RSN Live" /></a>
      <a class="back" href="./">← Voltar ao site</a>
    </header>

    <div class="gate" data-gate>
      <label for="gate-input">Senha do admin</label>
      <input id="gate-input" type="password" placeholder="••••••••" data-gate-input />
      <button type="button" data-gate-btn>Entrar</button>
      <p data-gate-hint>Painel de controle da transmissao</p>
    </div>

    <div class="panel" data-panel>
      <h1>Live Source</h1>
      <p class="sub">Console de controle da transmissao</p>

      <form class="form" data-form>
        <label for="url">URL do post ou broadcast no X</label>
        <div class="row">
          <input id="url" name="url" type="url" inputmode="url" placeholder="https://x.com/faaretz/status/... ou https://x.com/i/broadcasts/..." data-url />
          <button class="btn" type="submit">Atualizar</button>
        </div>
        <p data-msg>Cole a URL da live. Fica salva no navegador — ninguem ve na URL publica.</p>
        <div class="actions">
          <button class="btn btn-ghost" type="button" data-clear>Limpar salvo</button>
          <button class="btn btn-ghost" type="button" data-copy>Copiar link</button>
          <a class="btn btn-ghost" data-share href="./" target="_blank">Abrir link</a>
        </div>
      </form>

      <div class="preview">
        <p>URL salva agora:</p>
        <code data-preview>Nenhuma</code>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = "rsnsocial";
    const STORAGE = "rsnLiveUrl";

    const gate = document.querySelector("[data-gate]");
    const gateInput = document.querySelector("[data-gate-input]");
    const gateBtn = document.querySelector("[data-gate-btn]");
    const gateHint = document.querySelector("[data-gate-hint]");
    const panel = document.querySelector("[data-panel]");
    const form = document.querySelector("[data-form]");
    const urlInput = document.querySelector("[data-url]");
    const msg = document.querySelector("[data-msg]");
    const clearBtn = document.querySelector("[data-clear]");
    const copyBtn = document.querySelector("[data-copy]");
    const shareLink = document.querySelector("[data-share]");
    const preview = document.querySelector("[data-preview]");

    const norm = (v) => { try { const u = new URL(v, location.href); return u.protocol==="https:"?u.href:"" } catch { return "" } };
    const setMsg = (t) => { if (msg) msg.textContent = t };

    const saved = localStorage.getItem(STORAGE) || "";
    if (urlInput) urlInput.value = saved;
    if (preview) preview.textContent = saved || "Nenhuma";

    const updateShare = (u) => {
      if (!shareLink) return;
      const s = new URL(location.origin + location.pathname.replace(/admin\.html$/,""));
      if (u) s.searchParams.set("broadcast", u);
      shareLink.href = s.href;
    };
    updateShare(saved);

    const unlock = () => {
      if (gateInput?.value !== PASSWORD) {
        if (gateInput) gateInput.value = "";
        if (gateHint) { gateHint.textContent = "Senha incorreta."; gateHint.classList.add("error"); }
        return;
      }
      if (gate) gate.hidden = true;
      if (panel) panel.classList.add("is-open");
    };

    gateBtn?.addEventListener("click", unlock);
    gateInput?.addEventListener("keydown", (e) => { if (e.key === "Enter") unlock(); });

    form?.addEventListener("submit", (e) => {
      e.preventDefault();
      const u = norm(urlInput?.value || "");
      if (!u) { setMsg("Cole uma URL valida do X."); return; }
      localStorage.setItem(STORAGE, u);
      updateShare(u);
      if (preview) preview.textContent = u;
      setMsg("Salvo. Atualize a home pra ver a live no palco.");
    });

    clearBtn?.addEventListener("click", () => {
      localStorage.removeItem(STORAGE);
      updateShare("");
      if (urlInput) urlInput.value = "";
      if (preview) preview.textContent = "Nenhuma";
      setMsg("Limpo. A home volta ao default.");
    });

    copyBtn?.addEventListener("click", async () => {
      const u = shareLink?.href;
      if (!u) return;
      try { await navigator.clipboard.writeText(u); setMsg("Link copiado."); }
      catch { setMsg("Nao foi possivel copiar."); }
    });
  </script>
</body>
</html>
